<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium Emerald Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    
    <!-- Subtle Inner Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- App Icon Background Rounded Square (Squircle) -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" filter="url(#shadow)" />

  <!-- Accent Highlight Line -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.15" />

  <!-- Center "IB" Text -->
  <text x="50%" y="54%" 
        font-family="'Inter', -apple-system, sans-serif" 
        font-size="200" 
        font-weight="900" 
        fill="#ffffff" 
        text-anchor="middle" 
        alignment-baseline="middle"
        letter-spacing="-0.03em">IB</text>
</svg>
